<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulário de Inscrição</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#4facfe,#00f2fe);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      background:white;
      width:350px;
      padding:30px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    .container h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .input-group{
      margin-bottom:15px;
    }

    .input-group label{
      display:block;
      margin-bottom:5px;
      color:#555;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      transition:0.3s;
    }

    .input-group input:focus{
      border-color:#4facfe;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:#4facfe;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#008cff;
    }

    .mensagem{
      margin-top:15px;
      text-align:center;
      font-weight:bold;
      color:green;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Inscrição</h1>

    <form id="formulario">
      
      <div class="input-group">
        <label>Nome</label>
        <input type="text" id="nome" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="senha" required>
      </div>

      <button type="submit">Cadastrar</button>

      <div class="mensagem" id="mensagem"></div>

    </form>
  </div>

  <script>
    const formulario = document.getElementById("formulario");
    const mensagem = document.getElementById("mensagem");

    formulario.addEventListener("submit", function(event){
      event.preventDefault();

      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;

      mensagem.innerHTML = 
        `Cadastro realizado com sucesso!<br>Bem-vindo(a), ${nome}`;

      formulario.reset();
    });
  </script>

</body>
</html>
